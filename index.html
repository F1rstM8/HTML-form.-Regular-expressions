<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/js/css/style.css" />
    <script defer src="./assets/js/index.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Contact form</h2>
        <p>Please fill in your information and we'll be sending your order.</p>
      </div>

      <form class="contact-form">
        <div class="form-group">
          <label for="first-name">Your name</label>
          <div class="input-container multi-input">
            <input
              type="text"
              id="first-name"
              placeholder="first name"
              required
              pattern="^[A-Za-zА-Яа-яІіЇїЄєҐґ']+$"
              minlength="2"
              maxlength="30"
            />
            <input
              type="text"
              id="last-name"
              placeholder="last name"
              required
              pattern="^[A-Za-zА-Яа-яІіЇїЄєҐґ']+$"
              minlength="2"
              maxlength="40"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="user-email">Your email</label>
          <div class="input-container">
            <input
              type="email"
              id="user-email"
              placeholder="your_mail@mail.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="phone-1">Phone *</label>
          <div class="input-container multi-input" id="phone-inputs-wrapper">
            <input
              type="text"
              id="phone-1"
              placeholder="000"
              required
              pattern="\d{3}"
              maxlength="3"
            />
            <input
              type="text"
              id="phone-2"
              placeholder="000"
              required
              pattern="\d{3}"
              maxlength="3"
            />
            <input
              type="text"
              id="phone-3"
              placeholder="0000"
              required
              pattern="\d{4}"
              maxlength="4"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="user-subject">Message subject *</label>
          <div class="input-container">
            <select id="user-subject" required>
              <option value="" disabled>Select subject...</option>
              <option value="other" selected>Other</option>
              <option value="order">Order Details</option>
              <option value="support">Support</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="user-message">Message *</label>
          <div class="input-container">
            <textarea
              id="user-message"
              required
              minlength="10"
              maxlength="500"
              placeholder=" "
            ></textarea>
          </div>
        </div>

        <hr class="divider" />

        <button type="submit" class="submit-btn">SUBMIT FORM</button>
      </form>
    </div>
  </body>
</html>
